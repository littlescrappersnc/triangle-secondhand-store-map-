const cats = {
"Thrift": "#3F9E54", "Adult consignment":"#2E6CDB", "Adult/teen resale":"#1B8FB9", "Kids consignment":"#9A5BD6", "Furniture/vintage":"#E08732", "Vintage/curated":"#B85C38", "Home/building reuse":"#D6A613", "Creative reuse":"#6C8E23", "Other reuse":"#777777"
};
const map = L.map('map').setView([35.84,-78.78],10);
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {maxZoom:19, attribution:'© OpenStreetMap contributors'}).addTo(map);
const layers={};
const favoriteColor = "#f1c232";
let favoriteMode = false;
let categoryButtons = {};
function icon(color){return L.divIcon({className:'',html:`<div class="pin" style="background:${color}"></div>`,iconSize:[22,22],iconAnchor:[11,11]})}
function favIcon(){return L.divIcon({className:'',html:`<div class="favPin">★</div>`,iconSize:[32,32],iconAnchor:[16,16]})}
Object.keys(cats).forEach(c=>layers[c]=L.layerGroup().addTo(map));
places.forEach(p=>{
  const fav = p.favorite ? " <span style='color:#8a6400;font-weight:800'>★ Favorite</span>" : "";
  L.marker([p.lat,p.lng],{icon:icon(cats[p.category])})
    .bindPopup(`<b>${p.name}</b>${fav}<br>${p.category}<br><span style='color:#666'>${p.address}</span><br><i>${p.area}</i>`)
    .addTo(layers[p.category]);
});
const favLayer=L.layerGroup();
places.filter(p=>p.favorite).forEach(p=>{
  L.marker([p.lat,p.lng],{icon:favIcon()})
    .bindPopup(`<b>${p.name}</b> <span style='color:#8a6400;font-weight:800'>★ Favorite</span><br>${p.category}<br><span style='color:#666'>${p.address}</span><br><i>${p.area}</i>`)
    .addTo(favLayer);
});
const chips=document.getElementById('chips'), legend=document.getElementById('legend'), list=document.getElementById('list');
function renderList(favoritesOnly=false){
  const visiblePlaces = places.filter(p=>!favoritesOnly || p.favorite);
  list.innerHTML=visiblePlaces.slice().sort((a,b)=>a.area.localeCompare(b.area)||a.name.localeCompare(b.name)).map(p=>`<div class='place'><span class='dot' style='background:${p.favorite ? favoriteColor : cats[p.category]}'></span><span class='name'>${p.name}</span>${p.favorite ? " <span class='favBadge'>★ Favorite</span>" : ""}<br><span class='muted'>${p.category} · ${p.area} · ${p.address}</span></div>`).join('');
}
// Favorites filter chip: toggles a clean favorite-only view with star pins and favorite-only list.
const favButton=document.createElement('button');
favButton.className='chip';
favButton.innerHTML=`<span class='dot' style='background:${favoriteColor}'></span>Favorites ${places.filter(p=>p.favorite).length}`;
favButton.onclick=()=>{
  favoriteMode=!favoriteMode;
  if(favoriteMode){
    Object.keys(layers).forEach(c=>{ if(map.hasLayer(layers[c])) map.removeLayer(layers[c]); });
    map.addLayer(favLayer);
    favButton.classList.remove('off');
    Object.values(categoryButtons).forEach(b=>b.classList.add('off'));
    renderList(true);
    const favBounds = L.latLngBounds(places.filter(p=>p.favorite).map(p=>[p.lat,p.lng]));
    map.fitBounds(favBounds.pad(0.12));
  } else {
    if(map.hasLayer(favLayer)) map.removeLayer(favLayer);
    Object.entries(categoryButtons).forEach(([c,b])=>{ map.addLayer(layers[c]); b.classList.remove('off'); });
    renderList(false);
  }
};
chips.appendChild(favButton);
const favLegend=document.createElement('div');
favLegend.innerHTML=`<span class='dot' style='background:${favoriteColor}'></span>Favorites`;
legend.appendChild(favLegend);
Object.entries(cats).forEach(([c,color])=>{
  const count=places.filter(p=>p.category===c).length;
  const b=document.createElement('button');
  categoryButtons[c]=b;
  b.className='chip';
  b.innerHTML=`<span class='dot' style='background:${color}'></span>${c} ${count}`;
  b.onclick=()=>{
    if(favoriteMode){
      favoriteMode=false;
      if(map.hasLayer(favLayer)) map.removeLayer(favLayer);
      renderList(false);
      favButton.classList.remove('off');
    }
    if(map.hasLayer(layers[c])){map.removeLayer(layers[c]); b.classList.add('off')} else {map.addLayer(layers[c]); b.classList.remove('off')}
  };
  chips.appendChild(b);
  const d=document.createElement('div');
  d.innerHTML=`<span class='dot' style='background:${color}'></span>${c}`;
  legend.appendChild(d);
});
renderList(false);
</script></body></html>
